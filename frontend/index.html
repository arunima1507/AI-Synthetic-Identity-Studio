<!DOCTYPE html>
<html>

<head>

    <title>AI Synthetic Identity Studio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>AI Synthetic Identity Studio</h1>

    <button type="button" onclick="generateIdentity()">
        Generate Identity
    </button>

    <button onclick="generateDataset(10)">
        Generate 10 Identities
    </button>

    <button onclick="generateDataset(50)">
        Generate 50 Identities
    </button>

    <button onclick="generateDataset(100)">
        Generate 100 Identities
    </button>

    <button onclick="downloadCSV()">
        Download CSV Dataset
    </button>

    <button onclick="downloadCard()">
        Download Identity Card
    </button>

    <button onclick="downloadJSON()">
        Download JSON
    </button>

    <div class="container">
        <div id="dataset-info">

            <h2>Dataset Statistics</h2>

            <p id="dataset-size">
                Dataset Size: 0
            </p>

            <p id="avg-age">
                Average Age: 0
            </p>

            <p id="unique-cities">
                Unique Cities: 0
            </p>

            <p id="unique-occupations">
                Unique Occupations: 0
            </p>

        </div>
        <div id="history-panel">

            <h2>History</h2>

            <ul id="history-list"></ul>

        </div>

        <div id="identity-card"></div>

    </div>

    

    <script src="script.js"></script>

</body>

</html>
